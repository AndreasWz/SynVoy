name: synterra_env
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Core
  - python >=3.8
  - nextflow >=22.10.1

  # Bioinformatics tools
  - mmseqs2 >=14.7e284
  - blast >=2.13.0        # tblastn / makeblastdb
  - prodigal >=2.6.3
  - mafft >=7.505
  - miniprot
  - iqtree >=2.2.0

  # Genome fetching (easy mode)
  - ncbi-datasets-cli
  - entrez-direct

  # Python packages
  - biopython
  - plotly >=5.0.0
  - ete3                  # tree I/O in plot_synteny & phylo_sort
  - taxopy >=0.11.0       # phylogenetic sorting
  - parasail-python       # Smith-Waterman via parasail (GOI search)

  # Utilities
  - unzip

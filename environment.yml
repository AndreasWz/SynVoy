name: syntenyfinder
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Core dependencies
  - python >=3.8
  - nextflow >=22.10.1
  
  # Bioinformatics tools
  - mmseqs2 >=14.7e284
  - blast >=2.13.0
  - prodigal >=2.6.3
  - augustus >=3.5.0
  - mafft >=7.505
  
  # Python packages
  - biopython >=1.79
  - plotly >=5.0.0
  - pandas >=1.3.0
  - numpy >=1.21.0
  - scipy >=1.7.0
  
  # Optional: for phylogenetic sorting
  - taxopy >=0.11.0
  
  # Optional: for enhanced gene prediction
  - braker3  # optional, if available
  
  # Utilities
  - bedtools >=2.30.0
  - samtools >=1.15
